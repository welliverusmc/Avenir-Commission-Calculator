<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avenir Consulting Solutions - AT&T Commission Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding-bottom: 120px;
    }

    header {
      background: #143d73;
      color: white;
      text-align: center;
      padding: 20px 12px;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header h2 {
      margin: 8px 0 0;
      font-size: 18px;
      font-weight: normal;
    }

    .section-title {
      max-width: 700px;
      margin: 24px auto 8px;
      background: #143d73;
      color: white;
      padding: 10px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .card {
      max-width: 700px;
      margin: 8px auto;
      background: white;
      padding: 14px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.12);
    }

    .name {
      font-weight: bold;
      font-size: 18px;
    }

    .pay {
      color: #555;
      margin-top: 4px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 8px;
      background: #666;
      color: white;
      width: 42px;
      height: 42px;
      font-size: 24px;
      font-weight: bold;
    }

    .qty {
      min-width: 24px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #ccc;
      text-align: center;
      padding: 12px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.12);
    }

    .footer h2 {
      margin: 0 0 10px;
      color: #143d73;
    }

    .clear {
      width: auto;
      height: auto;
      padding: 12px 22px;
      background: #777;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Avenir Consulting Solutions</h1>
    <h2>AT&T Commission Calculator</h2>
  </header>

  <main id="products"></main>

  <div class="footer">
    <h2>Total Commission: <span id="total">$0.00</span></h2>
    <button class="clear" onclick="clearAll()">Clear All</button>
  </div>

  <script>
    const categories = {
      "Wireless": [
        ["New Line", 50],
        ["Upgrade", 20],
        ["BYOD", 35],
        ["Next Up", 10],
        ["Extra", 8],
        ["Premium", 11],
        ["Individual Insurance", 5],
        ["Family Insurance", 7]
      ],
      "Internet": [
        ["Internet AIR", 50]
      ],
      "Connected Devices": [
        ["Watch", 50],
        ["Tablet", 15]
      ]
    };

    const state = {};
    const root = document.getElementById("products");

    Object.entries(categories).forEach(([category, products]) => {
      const title = document.createElement("div");
      title.className = "section-title";
      title.textContent = category;
      root.appendChild(title);

      products.forEach(([name, pay]) => {
        state[name] = 0;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div>
            <div class="name">${name}</div>
            <div class="pay">$${pay} per item</div>
          </div>
          <div class="controls">
            <button type="button" class="minus">−</button>
            <span class="qty" id="${name.replaceAll(" ", "-")}">0</span>
            <button type="button" class="plus">+</button>
          </div>
        `;

        card.querySelector(".minus").addEventListener("click", () => change(name, -1));
        card.querySelector(".plus").addEventListener("click", () => change(name, 1));

        root.appendChild(card);
      });
    });

    function change(name, amount) {
      state[name] = Math.max(0, state[name] + amount);
      document.getElementById(name.replaceAll(" ", "-")).textContent = state[name];
      updateTotal();
    }

    function updateTotal() {
      let total = 0;

      Object.values(categories).flat().forEach(([name, pay]) => {
        total += state[name] * pay;
      });

      document.getElementById("total").textContent = "$" + total.toFixed(2);
    }

    function clearAll() {
      Object.keys(state).forEach(name => {
        state[name] = 0;
        document.getElementById(name.replaceAll(" ", "-")).textContent = "0";
      });

      updateTotal();
    }
  </script>
</body>
</html>
