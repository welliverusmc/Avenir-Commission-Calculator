<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AT&T Retail Commission Calculator</title>
<style>
:root{--navy:#143d73;--blue:#1f5fa8;--bg:#f2f4f7;--muted:#5f6773}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);padding-bottom:125px;color:#111827}
header{background:var(--navy);color:white;text-align:center;padding:24px 12px}
h1{margin:0;font-size:24px}
h2{margin:8px 0 0;font-size:20px}
.section{background:var(--navy);color:white;text-align:center;padding:12px;margin-top:16px;font-size:22px;font-weight:bold}
.card{display:flex;justify-content:space-between;align-items:center;background:white;margin:10px 12px;padding:14px;border-radius:12px;box-shadow:0 2px 7px rgba(0,0,0,.14)}
.name{font-size:20px;font-weight:bold}
.pay{font-size:16px;color:var(--muted);margin-top:4px}
.controls{display:flex;align-items:center;gap:12px}
.qty{min-width:26px;text-align:center;font-size:21px;font-weight:bold}
button{border:none;border-radius:10px;color:white;font-weight:bold;cursor:pointer}
.qty-btn{width:48px;height:48px;background:var(--blue);font-size:25px}
.footer{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid #cfd3da;padding:12px;text-align:center;box-shadow:0 -2px 10px rgba(0,0,0,.16)}
.footer h2{margin:6px 0;color:var(--navy)}
.clear{width:auto;height:auto;padding:12px 22px;background:#667085;font-size:18px}
.back{display:block;margin:12px;color:#143d73;font-weight:bold;text-decoration:none}
</style>
</head>
<body>
<header>
<h1>Avenir Consulting Solutions</h1>
<h2>AT&T Retail Commission Calculator</h2>
</header>
<a class="back" href="index.html">← Back to Menu</a>
<main id="app"></main>
<div class="footer">
<h2>Total Commission: <span id="total">$0.00</span></h2>
<button class="clear" onclick="clearAll()">Clear All</button>
</div>
<script>
const categories={
"Phone Lines":[["New Line",50],["Upgrade",20],["BYOD",35],["Next Up",10],["Extra",8],["Premium",11],["Individual Insurance",5],["Family Insurance",7]],
"Device Lines":[["Watch",50],["Tablet",15]],
"Internet Lines":[["Internet AIR",50]]
};
let counts={};
const app=document.getElementById("app");
function idFor(name){return name.replace(/[^a-zA-Z0-9]/g,"_");}
Object.entries(categories).forEach(([category,items])=>{
 const title=document.createElement("div");
 title.className="section";
 title.textContent=category;
 app.appendChild(title);
 items.forEach(([name,pay])=>{
  counts[name]=0;
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<div><div class="name">${name}</div><div class="pay">$${pay} per item</div></div>
  <div class="controls"><button class="qty-btn" onclick="changeQty('${name}',-1)">−</button><span class="qty" id="${idFor(name)}">0</span><button class="qty-btn" onclick="changeQty('${name}',1)">+</button></div>`;
  app.appendChild(card);
 });
});
function changeQty(name,amount){
 counts[name]=Math.max(0,counts[name]+amount);
 document.getElementById(idFor(name)).textContent=counts[name];
 update();
}
function update(){
 let total=0;
 Object.values(categories).flat().forEach(([name,pay])=>{total+=counts[name]*pay;});
 document.getElementById("total").textContent="$"+total.toFixed(2);
}
function clearAll(){
 Object.keys(counts).forEach(name=>{counts[name]=0;document.getElementById(idFor(name)).textContent="0";});
 update();
}
update();
</script>
</body>
</html>
